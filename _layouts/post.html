---
---
<!doctype html>
<html lang="en">
<title>{{ page.title }} | christopher's blog</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/style.css">
<link rel="alternate icon" type="image/png" href="/favicon.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
{% feed_meta %}
{% if page.summary %}
	<meta name="description" content="{{ page.summary }}">
{% endif %}
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
{% if page.image %}
    <meta property="og:image" content="{{ page.image }}">
{% endif %}

<h1 id="top" class="center-width wide" >{{ page.title }}</h1>
<div id="main-container" class="center-width wide">
	{% if page.summary %}
		<p>{{ page.summary }}</p>
	{% endif %}
	<p class="post-info">published {{ page.date | date: '%F' }} by <a href="/">christopher cooper</a></p>

	{{ content }}
</div>

<div class="center-width wide">
	<a href="/blog" class="display-link">more posts…</a>
</a>

</html>
